<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RyclRetro - PS1 Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f1015;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Container Utama */
        .console-container {
            width: 100%;
            max-width: 430px; 
            height: 100vh;
            background: #15171e;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            padding: 10px 15px;
            justify-content: flex-start;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .game-selector-btn, .speed-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .game-selector-btn { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Bagian Layar */
        .screen-section {
            width: 100%;
            height: 38vh;
            max-height: 40%;
            background: #000;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .emulator-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #game {
            width: 100% !important;
            height: 100% !important;
        }

        /* ANIMASI INTRO WATERMARK RYCLRETRO */
        .intro-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeOutOverlay 0.5s ease-in-out 3s forwards;
            pointer-events: none;
        }

        .intro-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.6), 0 0 20px rgba(59, 130, 246, 0.6);
            animation: introGlitch 1.5s ease-in-out infinite alternate;
        }

        @keyframes introGlitch {
            0% { transform: scale(0.95); opacity: 0.8; text-shadow: -2px 0 #ef4444, 2px 0 #3b82f6; }
            50% { transform: scale(1.02); opacity: 1; text-shadow: 2px 0 #ef4444, -2px 0 #3b82f6; }
            100% { transform: scale(1); opacity: 0.9; text-shadow: -1px 0 #ef4444, 1px 0 #3b82f6; }
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; visibility: hidden; }
        }

        /* Hapus UI bawaan emulator */
        div[id*="virtual-gamepad"], .ejs-controls, #game img, .pico8-content, [class*="gamepad"], #virtual-gamepad {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* Bagian Kontroler */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
        }

        /* Tombol LR */
        .lr-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            padding: 0 5px;
        }

        .btn-lr {
            flex: 1;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .btn-lr.active, .btn-lr:active { background: rgba(255, 255, 255, 0.2); color: #fff; }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        /* D-PAD */
        .dpad {
            position: relative;
            width: 130px;
            height: 130px;
        }

        .dpad-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .dpad-btn.active, .dpad-btn:active { background: rgba(255, 255, 255, 0.2); }
        .dpad-up { top: 0; left: 42px; width: 46px; height: 46px; border-radius: 6px 6px 0 0; border-bottom: none; }
        .dpad-down { bottom: 0; left: 42px; width: 46px; height: 46px; border-radius: 0 0 6px 6px; border-top: none; }
        .dpad-left { top: 42px; left: 0; width: 46px; height: 46px; border-radius: 6px 0 0 6px; border-right: none; }
        .dpad-right { top: 42px; right: 0; width: 46px; height: 46px; border-radius: 0 6px 6px 0; border-left: none; }
        .dpad-center { top: 42px; left: 42px; width: 46px; height: 46px; background: rgba(255, 255, 255, 0.02); pointer-events: none; }

        /* LAYOUT TOMBOL PLAYSTATION (DIAMOND SHAPE) */
        .action-buttons-ps {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .btn-ps {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-ps.active, .btn-ps:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.15); }

        /* Posisi Diamond Stik PS */
        .btn-triangle { top: 0; left: 48px; border-color: rgba(74, 222, 128, 0.4); color: #4ade80; } /* Hijau */
        .btn-square { top: 48px; left: 0; border-color: rgba(192, 132, 252, 0.4); color: #c084fc; }  /* Ungu */
        .btn-circle { top: 48px; right: 0; border-color: rgba(248, 113, 113, 0.4); color: #f87171; }  /* Merah */
        .btn-cross { bottom: 0; left: 48px; border-color: rgba(96, 165, 250, 0.4); color: #60a5fa; }   /* Biru (X) */

        /* Menu Buttons (Select & Start) */
        .menu-buttons {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: 5px;
            padding-bottom: 10px;
        }

        .btn-menu {
            width: 65px;
            height: 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .btn-menu.active, .btn-menu:active { background: rgba(255, 255, 255, 0.2); }
        .btn-menu::after {
            content: attr(data-label);
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        /* CUSTOM POPUP / MODAL STYLE */
        .custom-popup {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 16, 21, 0.95);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 20px;
        }

        .custom-popup.active { opacity: 1; pointer-events: auto; }
        .popup-content {
            background: #1c1e27;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .popup-close { font-size: 1.5rem; cursor: pointer; color: rgba(255,255,255,0.4); }

        /* Game List Style */
        .game-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
        }
        .game-item:active { background: rgba(255,255,255,0.08); }
        .game-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; background: #000; }
        .game-info { flex: 1; min-width: 0; }
        .game-title { font-size: 0.9rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .game-meta { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

        /* Speed Control Style */
        .speed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }
        .speed-val { font-size: 2rem; font-weight: bold; color: #fca5a5; }
        .speed-slider { width: 100%; accent-color: #ef4444; cursor: pointer; }
    </style>
</head>
<body>

    <div class="console-container">
        <div class="top-bar">
            <button class="game-selector-btn" id="openGameBtn">🎮 Loading Game...</button>
            <button class="speed-btn" id="openSpeedBtn">⚡ Speed: 1×</button>
        </div>

        <div class="screen-section">
            <div class="intro-overlay">
                <div class="intro-text">RyclRetro</div>
            </div>
            <div class="emulator-screen">
                <div id="game"></div>
            </div>
        </div>

        <div class="controls-section">
            <div class="lr-container">
                <div class="btn-lr" data-key="l">L</div>
                <div class="btn-lr" data-key="r">R</div>
            </div>

            <div class="main-controls">
                <div class="dpad">
                    <div class="dpad-btn dpad-up" data-key="ArrowUp"></div>
                    <div class="dpad-btn dpad-down" data-key="ArrowDown"></div>
                    <div class="dpad-btn dpad-left" data-key="ArrowLeft"></div>
                    <div class="dpad-btn dpad-right" data-key="ArrowRight"></div>
                    <div class="dpad-center"></div>
                </div>

                <!-- TOMBOL ACTION FORMAT PLAYSTATION -->
                <div class="action-buttons-ps">
                    <div class="btn-ps btn-triangle" data-key="triangle">▲</div>
                    <div class="btn-ps btn-square" data-key="square">■</div>
                    <div class="btn-ps btn-circle" data-key="circle">●</div>
                    <div class="btn-ps btn-cross" data-key="cross">✖</div>
                </div>
            </div>

            <div class="menu-buttons">
                <div class="btn-menu" data-label="Select" data-key="Select"></div>
                <div class="btn-menu" data-label="Start" data-key="Start"></div>
            </div>
        </div>
    </div>

    <div class="custom-popup" id="gamePopup">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Pilih Game</h3>
                <span class="popup-close" id="closeGamePopup">&times;</span>
            </div>
            <div class="game-list" id="gameListContainer"></div>
        </div>
    </div>

    <div class="custom-popup" id="speedPopup">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Kecepatan Game</h3>
                <span class="popup-close" id="closeSpeedPopup">&times;</span>
            </div>
            <div class="speed-container">
                <div class="speed-val" id="speedDisplay">1.0×</div>
                <input type="range" min="1" max="10" step="0.5" value="1" class="speed-slider" id="speedSlider">
            </div>
        </div>
    </div>

    <script>
        // 1. Siapkan variabel penampung global
        let gamesData = [];
        let currentGame = null;

        // 2. Fungsi Utama untuk Load JSON dan Setup EmulatorJS
        async function initEmulator() {
            try {
                // Ambil data game dari file games.json eksternal
                const response = await fetch('games.json');
                gamesData = await response.json();
                
                // Set game default (index pertama di JSON)
                currentGame = gamesData[0];

                // Cek parameter URL (?gameId=...)
                const urlParams = new URLSearchParams(window.location.search);
                const selectedGameId = urlParams.get('gameId');
                if(selectedGameId) {
                    const foundGame = gamesData.find(g => g.id === selectedGameId);
                    if(foundGame) currentGame = foundGame;
                }

                // Inject Konfigurasi global EmulatorJS setelah JSON sukses terbaca
                window.EJS_player = '#game';
                window.EJS_core = currentGame.type; 
                window.EJS_gameUrl = currentGame.file; 
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
                
                window.EJS_VirtualGamepadSettings = { extThemes: [] };
                window.EJS_Settings = {
                    showMenu: false,
                    startOnLoaded: true,
                    buttons: false, 
                    disableMenu: true,
                    FastForward: true, 
                    ForceWebAudio: true, 
                    WebGl: true 
                };

                // KEYBOARD MAPPING BAWAAN EMULATORJS UNTUK PSX / MULTI-CORE
                window.EJS_buttons = {
                    allow_up: 'ArrowUp', allow_down: 'ArrowDown', allow_left: 'ArrowLeft', allow_right: 'ArrowRight',
                    allow_a: 'z',       // Cross / X (Gas di CTR)
                    allow_b: 'x',       // Circle / Bulat (Tembak Senjata)
                    allow_x: 's',       // Square / Kotak (Ngerem/Drift)
                    allow_y: 'a',       // Triangle / Segitiga (Ganti Kamera)
                    allow_l: 'q', allow_r: 'w',
                    allow_select: 'Shift', allow_start: 'Enter'
                };

                // Update text tombol game di top-bar UI
                document.getElementById('openGameBtn').innerText = `🎮 ${currentGame.title}`;

                // Jalankan render list menu game popup
                renderGameList();

                // SUNTIK SCRIPT LOADER EMULATORJS SECARA DINAMIS
                const loaderScript = document.createElement('script');
                loaderScript.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.head.appendChild(loaderScript);

            } catch (error) {
                console.error("Gagal membaca file games.json:", error);
                document.getElementById('openGameBtn').innerText = `❌ Gagal Load JSON`;
            }
        }

        // 3. Fungsi Render List Game ke dalam Popup Modal
        function renderGameList() {
            const gameListContainer = document.getElementById('gameListContainer');
            gameListContainer.innerHTML = ''; // Reset container

            gamesData.forEach(game => {
                const item = document.createElement('div');
                item.className = 'game-item';
                item.innerHTML = `
                    <img src="${game.thumb}" class="game-thumb" alt="${game.title}">
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-meta">${game.file} | Tipe: ${game.type.toUpperCase()}</div>
                    </div>
                `;
                item.onclick = () => {
                    const url = new URL(window.location.href);
                    url.searchParams.set('gameId', game.id);
                    window.location.href = url.href;
                };
                gameListContainer.appendChild(item);
            });
        }

        // Jalankan sistem inisialisasi JSON saat halaman dimuat
        initEmulator();

        // -------------------------------------------------------------
        // SISA LOGIKA UI & KONTROLER CUSTOM LU (TETAP AMAN DI LUAR FETCH)
        // -------------------------------------------------------------
        const gamePopup = document.getElementById('gamePopup');
        const speedPopup = document.getElementById('speedPopup');

        document.getElementById('openSpeedBtn').onclick = () => speedPopup.classList.add('active');
        document.getElementById('closeSpeedPopup').onclick = () => speedPopup.classList.remove('active');
        document.getElementById('openGameBtn').onclick = () => gamePopup.classList.add('active');
        document.getElementById('closeGamePopup').onclick = () => gamePopup.classList.remove('active');

        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        const openSpeedBtn = document.getElementById('openSpeedBtn');

        speedSlider.oninput = function() {
            const val = parseFloat(this.value);
            speedDisplay.innerText = `${val.toFixed(1)}×`;
            openSpeedBtn.innerText = `⚡ Speed: ${val.toFixed(1)}×`;
            
            if (window.EJS_emulator && typeof window.EJS_emulator.speed === 'function') {
                window.EJS_emulator.speed(val);
            } else if (window.EJS_emulator && typeof window.EJS_emulator.setSpeed === 'function') {
                window.EJS_emulator.setSpeed(val);
            }
        };

        // INJEKSI INPUT SESUAI ELEMENT TOMBOL PS
        const ctrlButtons = document.querySelectorAll('.dpad-btn, .btn-ps, .btn-menu, .btn-lr');

        function sendCoreKey(type, btnType) {
            let keyCodeMap = {
                'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
                'cross': 90, 'circle': 88, 'square': 83, 'triangle': 65, 
                'l': 81, 'r': 87, 'Select': 16, 'Start': 13
            };
            
            let finalKey = btnType;
            if(btnType === 'cross') finalKey = 'z';      
            if(btnType === 'circle') finalKey = 'x';     
            if(btnType === 'square') finalKey = 's';     
            if(btnType === 'triangle') finalKey = 'a';   
            if(btnType === 'l') finalKey = 'q';
            if(btnType === 'r') finalKey = 'w';
            if(btnType === 'Select') finalKey = 'Shift';
            if(btnType === 'Start') finalKey = 'Enter';

            const eventInit = {
                key: finalKey,
                keyCode: keyCodeMap[btnType],
                code: finalKey === 'Shift' ? 'ShiftLeft' : (finalKey === 'Enter' ? 'Enter' : 'Key' + finalKey.toUpperCase()),
                bubbles: true,
                cancelable: true,
                view: window
            };

            document.dispatchEvent(new KeyboardEvent(type, eventInit));
            const gameContainer = document.getElementById('game');
            if(gameContainer) {
                gameContainer.dispatchEvent(new KeyboardEvent(type, eventInit));
                const canvas = gameContainer.querySelector('canvas');
                if(canvas) canvas.dispatchEvent(new KeyboardEvent(type, eventInit));
            }
        }

        ctrlButtons.forEach(button => {
            const startEvent = 'ontouchstart' in window ? 'touchstart' : 'mousedown';
            const endEvent = 'ontouchstart' in window ? 'touchend' : 'mouseup';
            const key = button.getAttribute('data-key') || button.getAttribute('data-label');

            button.addEventListener(startEvent, (e) => {
                e.preventDefault();
                button.classList.add('active');
                sendCoreKey('keydown', key);
            });

            button.addEventListener(endEvent, (e) => {
                e.preventDefault();
                button.classList.remove('active');
                sendCoreKey('keyup', key);
            });

            button.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const elementTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                if (elementTarget !== button) {
                    button.classList.remove('active');
                    sendCoreKey('keyup', key);
                }
            });

            if(startEvent === 'mousedown') {
                button.addEventListener('mouseleave', () => {
                    button.classList.remove('active');
                    sendCoreKey('keyup', key);
                });
            }
        });

        document.addEventListener('gesturestart', (e) => e.preventDefault());
    </script>
</body>
</html>
