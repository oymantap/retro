<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RyclRetro - Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f1015;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        .console-container {
            width: 100%;
            max-width: 430px; 
            height: 100vh;
            background: #15171e;
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            padding: 10px 15px;
            justify-content: flex-start;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .game-selector-btn, .speed-btn, .upload-btn {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .game-selector-btn { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .upload-btn { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.4); }

        .screen-section {
            width: 100%;
            height: 38vh;
            max-height: 40%;
            background: #000;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .emulator-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        #game {
            width: 100% !important;
            height: 100% !important;
        }

        .intro-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0b0e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeOutOverlay 0.5s ease-in-out 3s forwards;
            pointer-events: none;
        }

        .intro-text {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.6), 0 0 20px rgba(59, 130, 246, 0.6);
            animation: introGlitch 1.5s ease-in-out infinite alternate;
        }

        @keyframes introGlitch {
            0% { transform: scale(0.95); opacity: 0.8; text-shadow: -2px 0 #ef4444, 2px 0 #3b82f6; }
            50% { transform: scale(1.02); opacity: 1; text-shadow: 2px 0 #ef4444, -2px 0 #3b82f6; }
            100% { transform: scale(1); opacity: 0.9; text-shadow: -1px 0 #ef4444, 1px 0 #3b82f6; }
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; visibility: hidden; }
        }

        div[id*="virtual-gamepad"], .ejs-controls, #game img, .pico8-content, [class*="gamepad"], #virtual-gamepad {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 999;
            touch-action: none;
        }

        .lr-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            padding: 0 5px;
        }

        .btn-lr {
            flex: 1;
            height: 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .btn-lr.active { background: rgba(255, 255, 255, 0.2); color: #fff; }

        /* Mencegah icon merusak event pembacaan touch */
        .dpad-btn i, .btn-ps i, .btn-lr i, .btn-menu i {
            pointer-events: none !important;
        }

        .main-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }

        .dpad {
            position: relative;
            width: 138px; 
            height: 138px;
            display: grid;
            grid-template-columns: repeat(3, 46px);
            grid-template-rows: repeat(3, 46px);
        }

        .dpad-btn, .dpad-center {
            width: 46px;
            height: 46px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .dpad-btn.active { background: rgba(255, 255, 255, 0.2); }

        .dpad-up    { grid-column: 2; grid-row: 1; border-radius: 6px 6px 0 0; border-bottom: none; }
        .dpad-left  { grid-column: 1; grid-row: 2; border-radius: 6px 0 0 6px; border-right: none; }
        .dpad-center{ grid-column: 2; grid-row: 2; background: rgba(255, 255, 255, 0.02); border: none; }
        .dpad-right { grid-column: 3; grid-row: 2; border-radius: 0 6px 6px 0; border-left: none; }
        .dpad-down  { grid-column: 2; grid-row: 3; border-radius: 0 0 6px 6px; border-top: none; }

        .action-buttons-ps {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .btn-ps {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 1rem;
        }
        .btn-ps.active { transform: scale(0.9); background: rgba(255, 255, 255, 0.15); }

        .btn-triangle { top: 0; left: 48px; border-color: rgba(74, 222, 128, 0.4); color: #4ade80; } 
        .btn-square { top: 48px; left: 0; border-color: rgba(192, 132, 252, 0.4); color: #c084fc; }  
        .btn-circle { top: 48px; right: 0; border-color: rgba(248, 113, 113, 0.4); color: #f87171; }  
        .btn-cross { bottom: 0; left: 48px; border-color: rgba(96, 165, 250, 0.4); color: #60a5fa; }   

        .menu-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
            padding-bottom: 10px;
        }

        .menu-buttons {
            display: flex;
            justify-content: center;
            gap: 60px;
            width: 100%;
        }

        .btn-menu {
            width: 65px;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .btn-menu.active { background: rgba(255, 255, 255, 0.3); }
        .btn-menu::after {
            content: attr(data-label);
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            font-weight: bold;
        }

        .custom-popup {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 16, 21, 0.95);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 20px;
        }

        .custom-popup.active { opacity: 1; pointer-events: auto; }
        .popup-content {
            background: #1c1e27;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        .popup-close { font-size: 1.5rem; cursor: pointer; color: rgba(255,255,255,0.4); }

        .game-list {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .game-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
        }
        .game-item:active { background: rgba(255,255,255,0.08); }
        .game-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; background: #000; }
        .game-info { flex: 1; min-width: 0; }
        .game-title { font-size: 0.9rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .game-meta { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

        .speed-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }
        .speed-val { font-size: 2rem; font-weight: bold; color: #fca5a5; }
        .speed-slider { width: 100%; accent-color: #ef4444; cursor: pointer; }
    </style>
</head>
<body>

    <div class="console-container">
        <div class="top-bar">
            <button class="game-selector-btn" id="openGameBtn"><i class="fas fa-gamepad"></i> Loading Game...</button>
            <label class="upload-btn" for="localRomInput">
                <i class="fas fa-file-upload"></i> Upload
            </label>
            <input type="file" id="localRomInput" accept=".gba,.gbc,.gb,.nes" style="display: none;">
            <button class="speed-btn" id="openSpeedBtn"><i class="fas fa-bolt"></i> 1×</button>
        </div>

        <div class="screen-section">
            <div class="intro-overlay">
                <div class="intro-text">RyclRetro</div>
            </div>
            <div class="emulator-screen">
                <div id="game"></div>
            </div>
        </div>

        <div class="controls-section">
            <div class="lr-container">
                <div class="btn-lr" data-key="l">
                    <i class="fas fa-angles-left" style="margin-right: 5px;"></i> L
                </div>
                <div class="btn-lr" data-key="r">
                    R <i class="fas fa-angles-right" style="margin-left: 5px;"></i>
                </div>
            </div>

            <div class="main-controls">
                <div class="dpad" id="dpadRegion">
                    <div class="dpad-btn dpad-up" data-key="ArrowUp"><i class="fas fa-chevron-up"></i></div>
                    <div class="dpad-btn dpad-down" data-key="ArrowDown"><i class="fas fa-chevron-down"></i></div>
                    <div class="dpad-btn dpad-left" data-key="ArrowLeft"><i class="fas fa-chevron-left"></i></div>
                    <div class="dpad-btn dpad-right" data-key="ArrowRight"><i class="fas fa-chevron-right"></i></div>
                    <div class="dpad-center" id="dpadCenterIcon"><i class="fas fa-circle" style="font-size: 0.5rem; opacity: 0.3;"></i></div>
                </div>

                <div class="action-buttons-ps" id="actionRegion">
                    <div class="btn-ps btn-triangle" data-key="triangle"><i class="fas fa-caret-up"></i></div>
                    <div class="btn-ps btn-square" data-key="square"><i class="fas fa-square" style="font-size: 0.8rem;"></i></div>
                    <div class="btn-ps btn-circle" data-key="circle"><i class="fas fa-circle" style="font-size: 0.8rem;"></i></div>
                    <div class="btn-ps btn-cross" data-key="cross"><i class="fas fa-xmark"></i></div>
                </div>
            </div>

            <div class="menu-row">
                <div class="menu-buttons">
                    <div class="btn-menu" data-label="Select" data-key="Select"></div>
                    <div class="btn-menu" data-label="Start" data-key="Start"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="custom-popup" id="gamePopup">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Pilih Game</h3>
                <span class="popup-close" id="closeGamePopup">&times;</span>
            </div>
            <div class="game-list" id="gameListContainer"></div>
        </div>
    </div>

    <div class="custom-popup" id="speedPopup">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Kecepatan Game</h3>
                <span class="popup-close" id="closeSpeedPopup">&times;</span>
            </div>
            <div class="speed-container">
                <div class="speed-val" id="speedDisplay">1.0×</div>
                <input type="range" min="1" max="10" step="0.5" value="1" class="speed-slider" id="speedSlider">
            </div>
        </div>
    </div>

    <script>
        let gamesData = [];
        let currentGame = null;
        let currentlyPressedKeys = new Set();

        async function initEmulator() {
            try {
                const response = await fetch('./games.json');
                gamesData = await response.json();
                currentGame = gamesData[0];

                const urlParams = new URLSearchParams(window.location.search);
                const selectedGameId = urlParams.get('gameId');
                if(selectedGameId) {
                    const foundGame = gamesData.find(g => g.id === selectedGameId);
                    if(foundGame) currentGame = foundGame;
                }

                bootEmulatorJS(currentGame.file, currentGame.type, currentGame.title);
                renderGameList();
            } catch (error) {
                console.error("Gagal membaca file games.json:", error);
                document.getElementById('openGameBtn').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Gagal Load JSON`;
            }
        }

        function bootEmulatorJS(fileUrl, coreType, title) {
            window.EJS_player = '#game';
            window.EJS_core = coreType; 
            window.EJS_gameUrl = fileUrl; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            
            window.EJS_VirtualGamepadSettings = { extThemes: [] };
            
            window.EJS_Settings = {
                showMenu: false,
                startOnLoaded: true,
                buttons: false, 
                disableMenu: true,
                FastForward: true, 
                ForceWebAudio: false, 
                WebGl: true,
                WebGL2: true,         
                ThreadedRendering: true 
            };

            window.EJS_buttons = {
                allow_up: 'ArrowUp', allow_down: 'ArrowDown', allow_left: 'ArrowLeft', allow_right: 'ArrowRight',
                allow_a: 'z', allow_b: 'x', allow_x: 's', allow_y: 'a',
                allow_l: 'q', allow_r: 'w', allow_select: 'Shift', allow_start: 'Enter'
            };

            document.getElementById('openGameBtn').innerHTML = `<i class="fas fa-gamepad"></i> ${title}`;

            const loaderScript = document.createElement('script');
            loaderScript.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.head.appendChild(loaderScript);
        }

         function renderGameList() {
            const container = document.getElementById('gameListContainer');
            container.innerHTML = ''; 
            gamesData.forEach(game => {
                const item = document.createElement('div');
                item.className = 'game-item';
                item.innerHTML = `<img src="${game.thumb}" class="game-thumb"><div class="game-info"><div class="game-title">${game.title}</div><div class="game-meta">Tipe: ${game.type.toUpperCase()}</div></div>`;
                item.onclick = () => {
                    const url = new URL(window.location.href);
                    url.searchParams.set('gameId', game.id);
                    window.location.href = url.href;
                };
                container.appendChild(item);
            });
        }

        document.getElementById('localRomInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const fileUrl = URL.createObjectURL(file);
            let detectedCore = 'gba';
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'gbc' || ext === 'gb') detectedCore = 'gb';
            if (ext === 'nes') detectedCore = 'nes';

            document.getElementById('game').innerHTML = '';
            bootEmulatorJS(fileUrl, detectedCore, file.name);
            const overlay = document.querySelector('.intro-overlay');
            if(overlay) overlay.style.display = 'none';
        });

        const gamePopup = document.getElementById('gamePopup');
        const speedPopup = document.getElementById('speedPopup');
        document.getElementById('openSpeedBtn').onclick = () => speedPopup.classList.add('active');
        document.getElementById('closeSpeedPopup').onclick = () => speedPopup.classList.remove('active');
        document.getElementById('openGameBtn').onclick = () => gamePopup.classList.add('active');
        document.getElementById('closeGamePopup').onclick = () => gamePopup.classList.remove('active');

        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        const openSpeedBtn = document.getElementById('openSpeedBtn');
        speedSlider.oninput = function() {
            const val = parseFloat(this.value);
            speedDisplay.innerText = `${val.toFixed(1)}×`;
            openSpeedBtn.innerHTML = `<i class="fas fa-bolt"></i> ${val.toFixed(1)}×`;
            if (window.EJS_emulator && typeof window.EJS_emulator.speed === 'function') window.EJS_emulator.speed(val);
        };

        // KOREKSI AMAN: Jalur pengiriman event dibatasi agar tidak memicu shortcut browser (F5/Refresh)
        function sendCoreKey(type, btnType) {
            let keyCodeMap = {
                'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
                'cross': 90, 'circle': 88, 'square': 83, 'triangle': 65, 
                'l': 81, 'r': 87, 'Select': 16, 'Start': 13
            };
            
            let finalKey = btnType;
            if(btnType === 'cross') finalKey = 'z';      
            if(btnType === 'circle') finalKey = 'x';     
            if(btnType === 'square') finalKey = 's';     
            if(btnType === 'triangle') finalKey = 'a';   
            if(btnType === 'l') finalKey = 'q';
            if(btnType === 'r') finalKey = 'w';
            if(btnType === 'Select') finalKey = 'Shift';
            if(btnType === 'Start') finalKey = 'Enter';

            const eventInit = {
                key: finalKey,
                keyCode: keyCodeMap[btnType] || 0,
                code: finalKey === 'Shift' ? 'ShiftLeft' : (finalKey === 'Enter' ? 'Enter' : 'Key' + finalKey.toUpperCase()),
                bubbles: true,
                cancelable: true,
                view: window
            };

            const kEvent = new KeyboardEvent(type, eventInit);
            
            // Kirim event HANYA ke area element game, jangan ke window global biar ga memicu refresh browser
            const gameContainer = document.getElementById('game');
            if (gameContainer) {
                gameContainer.dispatchEvent(kEvent);
            }
            document.dispatchEvent(kEvent);
        }

        function processTouchFrame(e) {
            e.preventDefault();
            let activeThisFrame = new Set();

            for (let i = 0; i < e.touches.length; i++) {
                let t = e.touches[i];
                let targetEl = document.elementFromPoint(t.clientX, t.clientY);

                if (targetEl) {
                    if (targetEl.tagName === 'I') {
                        targetEl = targetEl.parentElement;
                    }

                    if (targetEl.classList.contains('dpad-btn') || targetEl.classList.contains('btn-ps') || targetEl.classList.contains('btn-lr') || targetEl.classList.contains('btn-menu')) {
                        let key = targetEl.getAttribute('data-key') || targetEl.getAttribute('data-label');
                        if (key) {
                            activeThisFrame.add(key);
                            if (!currentlyPressedKeys.has(key)) {
                                currentlyPressedKeys.add(key);
                                targetEl.classList.add('active');
                                sendCoreKey('keydown', key);
                            }
                        }
                    }
                }
            }

            for (let key of currentlyPressedKeys) {
                if (!activeThisFrame.has(key)) {
                    currentlyPressedKeys.delete(key);
                    const el = document.querySelector(`[data-key="${key}"], [data-label="${key}"]`);
                    if (el) el.classList.remove('active');
                    sendCoreKey('keyup', key);
                }
            }
        }

        const ctrlSection = document.querySelector('.controls-section');
        ctrlSection.addEventListener('touchstart', processTouchFrame, { passive: false });
        ctrlSection.addEventListener('touchmove', processTouchFrame, { passive: false });
        ctrlSection.addEventListener('touchend', (e) => {
            processTouchFrame(e);
            if (e.touches.length === 0) {
                currentlyPressedKeys.forEach(key => sendCoreKey('keyup', key));
                document.querySelectorAll('.dpad-btn, .btn-ps, .btn-lr, .btn-menu').forEach(b => b.classList.remove('active'));
                currentlyPressedKeys.clear();
            }
        }, { passive: false });

        initEmulator();
        document.addEventListener('gesturestart', (e) => e.preventDefault());
    </script>
</body>
</html>
